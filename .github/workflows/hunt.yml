name: A1 Capacity Hunt

# Runs every 10 minutes at :00, :10, :20, :30, :40, :50.
# The 1/6 hunt is offset to :05, :15, :25, :35, :45, :55 so combined the
# two workflows fire one attempt every 5 minutes without colliding on
# OCI's API. 5 minutes is GitHub Actions' minimum cron interval - can't
# go faster than that on the platform.
#
# Public repos get unlimited Actions minutes, so the previous free-tier
# math no longer applies.
#
# GitHub Actions cron is best-effort: scheduled runs can be delayed during
# heavy load and rare runs may be skipped. Don't expect millisecond precision.
on:
  # Primary trigger: external Cloudflare Worker cron firing repository_dispatch.
  # GitHub's public-repo cron is unreliable, so we use Cloudflare as the real
  # scheduler and treat GitHub's schedule below as a fallback in case Cloudflare
  # is down.
  repository_dispatch:
    types: [hunt-2-12]
  schedule:
    - cron: '0,10,20,30,40,50 * * * *'   # fallback only
  workflow_dispatch:  # manual trigger from Actions tab

permissions:
  contents: read

# Opt into Node.js 24 for JavaScript actions. Node 20 is deprecated and will
# be forced off on June 16, 2026; Node 20 is removed entirely on Sept 16, 2026.
# Setting this env var now means actions/checkout and actions/setup-python run
# on Node 24 already, so we don't get a nasty surprise when the forced switch
# happens. Drop this once the default switches and the warning disappears.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  # Only one hunt at a time. If a previous run is somehow still going, cancel it.
  group: a1-hunt
  cancel-in-progress: true

jobs:
  attempt:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install OCI SDK
        run: pip install --no-cache-dir oci

      - name: Attempt launch
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_USER_OCID:    ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT:  ${{ secrets.OCI_FINGERPRINT }}
          OCI_REGION:       uk-london-1
          OCI_PRIVATE_KEY:  ${{ secrets.OCI_PRIVATE_KEY }}
          NTFY_URL:         ${{ secrets.NTFY_URL }}
          OCPUS:            '2'
          MEMORY:           '12'
        run: python launch_a1.py
